name: CI

on:
  push:
    branches: [main, version-1.1]
  pull_request:
    branches: [main, version-1.1]

jobs:
  frontend:
    name: Frontend Check (Astro)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend-astro

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend-astro/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Test
        run: npm test

      - name: Type check
        run: npx astro check

      - name: Build
        run: npx astro build
        env:
          PUBLIC_API_BASE: http://localhost:8000
